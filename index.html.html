<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Especial - I Love You Matrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Canvas do efeito Matrix */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transform: scale(0.9);
            animation: scaleIn 0.6s ease-out forwards;
            backdrop-filter: blur(10px);
            margin: 20px;
            max-width: 90%;
            z-index: 2;
            position: relative;
            border: 2px solid rgba(147, 51, 234, 0.3);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .mensagem-principal {
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: #764ba2;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.8s ease-out;
        }

        .mensagem-secundaria {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: #9333ea;
            margin-bottom: 30px;
            font-weight: 500;
            animation: slideUp 0.8s ease-out 0.2s backwards;
        }

        .emoji {
            font-size: clamp(3rem, 8vw, 5rem);
            animation: bounce 2s infinite;
            margin-top: 20px;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .coracoes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .coracao {
            position: absolute;
            font-size: 20px;
            animation: floatHeart 4s ease-in infinite;
            opacity: 0;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-20vh) scale(1.2);
                opacity: 0;
            }
        }

        button {
            background: linear-gradient(135deg, #9333ea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
            z-index: 2;
            position: relative;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(147, 51, 234, 0.5);
        }

        @media (max-width: 768px) {
            .card {
                padding: 30px 20px;
            }
        }

        /* Brilho ao redor do card */
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #9333ea, #a855f7, #c084fc, #9333ea);
            border-radius: 22px;
            z-index: -1;
            opacity: 0;
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="coracoes" id="coracoes"></div>
    
    <div class="card">
        <div class="mensagem-principal">
            🎉 PARABÉNS! 🎉
        </div>
        <div class="mensagem-secundaria">
            Você é incrível e te amo 💜
        </div>
        <div class="emoji">
            🌟 💖 🌟
        </div>
        <button onclick="mostrarMensagemExtra()">
            Clique para mais amor ❤️
        </button>
    </div>

    <script>
        // Efeito Matrix com "I love you" na cor roxa
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        
        canvas.width = width;
        canvas.height = height;
        
        const text = "I love you";
        const fontSize = 20;
        let columns = Math.floor(width / fontSize);
        let drops = [];
        
        // Inicializar as gotas
        for(let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }
        
        function drawMatrix() {
            // Fundo semi-transparente para criar efeito de rastro
            ctx.fillStyle = 'rgba(10, 0, 20, 0.05)';
            ctx.fillRect(0, 0, width, height);
            
            // Definir cor roxa para o texto
            ctx.fillStyle = '#c084fc';
            ctx.font = fontSize + 'px "Courier New", monospace';
            
            // Desenhar os caracteres
            for(let i = 0; i < drops.length; i++) {
                // Escolher um caractere da string "I love you"
                const charIndex = Math.floor(Math.random() * text.length);
                const character = text[charIndex];
                
                // Variar a cor entre tons de roxo
                const purpleShades = ['#a855f7', '#c084fc', '#d8b4fe', '#9333ea', '#b77dff'];
                ctx.fillStyle = purpleShades[Math.floor(Math.random() * purpleShades.length)];
                
                // Desenhar o caractere
                ctx.fillText(character, i * fontSize, drops[i] * fontSize);
                
                // Resetar a posição quando chegar ao fundo ou aleatoriamente
                if(drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                
                // Mover para baixo
                drops[i]++;
            }
            
            // Adicionar algumas partículas brilhantes ocasionais
            if(Math.random() > 0.97) {
                ctx.fillStyle = '#a855f7';
                ctx.font = '24px "Courier New", monospace';
                const randomCol = Math.floor(Math.random() * columns);
                const randomChar = text[Math.floor(Math.random() * text.length)];
                ctx.fillText(randomChar, randomCol * fontSize, 0);
            }
        }
        
        // Ajustar tamanho do canvas quando a janela for redimensionada
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            columns = Math.floor(width / fontSize);
            drops = [];
            for(let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }
        }
        
        window.addEventListener('resize', resizeCanvas);
        
        // Iniciar animação Matrix
        setInterval(drawMatrix, 50);
        
        // Função para criar corações flutuantes
        function criarCoracao() {
            const coracao = document.createElement('div');
            coracao.className = 'coracao';
            coracao.innerHTML = ['❤️', '💖', '💗', '💓', '💕', '💜', '🧡', '💝', '💘'][Math.floor(Math.random() * 9)];
            coracao.style.left = Math.random() * 100 + '%';
            coracao.style.animationDuration = 3 + Math.random() * 3 + 's';
            coracao.style.fontSize = 15 + Math.random() * 25 + 'px';
            coracao.style.opacity = 0.6 + Math.random() * 0.4;
            
            document.getElementById('coracoes').appendChild(coracao);
            
            setTimeout(() => {
                coracao.remove();
            }, 6000);
        }
        
        // Gerar corações continuamente
        setInterval(criarCoracao, 300);
        
        // Função para mensagem extra ao clicar no botão
        function mostrarMensagemExtra() {
            const mensagens = [
                "💜 Você é especial demais! 💜",
                "✨ Ilumina meus dias! ✨",
                "🌟 Você merece todo o amor do mundo! 🌟",
                "💕 Meu coração bate por você! 💕",
                "🎈 Você é a pessoa mais incrível! 🎈",
                "💜 I love you more than words can say! 💜",
                "✨ You're my everything! ✨"
            ];
            
            const mensagemAleatoria = mensagens[Math.floor(Math.random() * mensagens.length)];
            
            // Criar um alerta estilizado personalizado
            const alertDiv = document.createElement('div');
            alertDiv.textContent = mensagemAleatoria;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '50%';
            alertDiv.style.left = '50%';
            alertDiv.style.transform = 'translate(-50%, -50%)';
            alertDiv.style.backgroundColor = '#2d1b3a';
            alertDiv.style.color = '#c084fc';
            alertDiv.style.padding = '20px 40px';
            alertDiv.style.borderRadius = '50px';
            alertDiv.style.fontSize = '1.3rem';
            alertDiv.style.fontWeight = 'bold';
            alertDiv.style.boxShadow = '0 10px 30px rgba(147, 51, 234, 0.5)';
            alertDiv.style.zIndex = '1000';
            alertDiv.style.textAlign = 'center';
            alertDiv.style.animation = 'fadeIn 0.3s ease-out';
            alertDiv.style.fontFamily = "'Segoe UI', 'Arial', sans-serif";
            alertDiv.style.border = '2px solid #a855f7';
            
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.style.animation = 'fadeOut 0.3s ease-out';
                setTimeout(() => {
                    alertDiv.remove();
                }, 300);
            }, 2000);
            
            // Adicionar efeito de corações extras no clique
            for(let i = 0; i < 15; i++) {
                setTimeout(() => {
                    criarCoracao();
                }, i * 50);
            }
        }
        
        // Adicionar estilo para fadeOut e fadeIn
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                from {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1);
                }
                to {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(0.8);
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(0.8);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1);
                }
            }
        `;
        document.head.appendChild(style);
        
        // Gerar alguns corações iniciais
        for(let i = 0; i < 20; i++) {
            setTimeout(() => {
                criarCoracao();
            }, i * 100);
        }
        
        // Adicionar efeito de brilho nas letras Matrix ocasionalmente
        setInterval(() => {
            if(Math.random() > 0.95) {
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 28px "Courier New", monospace';
                const randomCol = Math.floor(Math.random() * columns);
                ctx.fillText('💜', randomCol * fontSize, Math.random() * height);
            }
        }, 100);
    </script>
</body>
</html>
